<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATTITUDE FM — 98.7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0e0e;
    --panel:#171717;
    --red:#e8232c;
    --gold:#d4af37;
    --lcd:#39ff14;
    --cream:#f0e9dc;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at 50% 0%, #1a1a1a 0%, var(--bg) 60%);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Rajdhani', sans-serif;
    color:var(--cream);
    padding:24px;
  }
  .radio{
    width:100%;
    max-width:480px;
    background:linear-gradient(160deg, #1c1c1c, #0c0c0c);
    border:1px solid #2b2b2b;
    border-radius:18px;
    box-shadow:0 0 0 1px #000, 0 30px 60px -20px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.04);
    padding:22px;
    position:relative;
    overflow:hidden;
  }
  .radio::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .station-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .station-name{
    font-family:'Anton', sans-serif;
    font-size:26px;
    letter-spacing:1px;
    color:var(--red);
    text-shadow:0 0 18px rgba(232,35,44,0.5);
  }
  .freq{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:#999;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:#444;
  }
  .dot.live{
    background:var(--red);
    box-shadow:0 0 8px var(--red);
    animation:blink 1s infinite;
  }
  @keyframes blink{50%{opacity:0.25;}}

  .lcd{
    background:#04150a;
    border:1px solid #0f3a1d;
    border-radius:8px;
    padding:12px 14px;
    margin-bottom:18px;
    font-family:'JetBrains Mono', monospace;
    color:var(--lcd);
    box-shadow:inset 0 0 18px rgba(57,255,20,0.08);
  }
  .lcd .label{
    font-size:10px;
    letter-spacing:2px;
    color:#1f8a3d;
    margin-bottom:4px;
  }
  .lcd .track{
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px 0 8px;
  }
  .knob{
    width:128px;height:128px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #2a2a2a, #0a0a0a 70%);
    border:3px solid var(--gold);
    box-shadow:0 0 0 6px #111, 0 0 30px rgba(212,175,55,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    transition:transform 0.15s ease;
  }
  .knob:active{transform:scale(0.96);}
  .knob .core{
    width:54px;height:54px;
    border-radius:50%;
    background:var(--red);
    box-shadow:0 0 22px rgba(232,35,44,0.7);
    display:flex;align-items:center;justify-content:center;
  }
  .knob .core svg{width:22px;height:22px;fill:#fff;}
  .knob.playing .core{
    background:var(--cream);
  }
  .knob.playing .core svg{fill:var(--red);}

  .cta{
    margin-top:14px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:2px;
    color:#aaa;
    text-transform:uppercase;
  }

  .eq{
    display:flex;
    gap:4px;
    align-items:flex-end;
    height:26px;
    margin-top:16px;
  }
  .eq span{
    width:4px;
    background:var(--red);
    border-radius:2px;
    height:6px;
    opacity:0.35;
  }
  .eq.live span{
    opacity:1;
    animation:bounce 0.9s infinite ease-in-out;
  }
  .eq span:nth-child(1){animation-delay:0s;}
  .eq span:nth-child(2){animation-delay:0.1s;}
  .eq span:nth-child(3){animation-delay:0.2s;}
  .eq span:nth-child(4){animation-delay:0.3s;}
  .eq span:nth-child(5){animation-delay:0.15s;}
  .eq span:nth-child(6){animation-delay:0.25s;}
  .eq span:nth-child(7){animation-delay:0.05s;}
  @keyframes bounce{
    0%,100%{height:6px;}
    50%{height:24px;}
  }

  .lines{
    margin-top:24px;
    border-top:1px dashed #2c2c2c;
    padding-top:18px;
    min-height:170px;
  }
  .line{
    font-size:18px;
    font-weight:700;
    line-height:1.5;
    color:#666;
    transition:color 0.25s ease, transform 0.25s ease;
    padding:3px 0;
  }
  .line.active{
    color:var(--cream);
    transform:translateX(4px);
  }
  .line.active::before{
    content:"▶ ";
    color:var(--red);
  }
  .line.done{
    color:#8a8a8a;
  }

  .footer-tag{
    margin-top:18px;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:2px;
    color:#555;
  }

  .no-voice-note{
    margin-top:10px;
    font-size:12px;
    color:#888;
    text-align:center;
    display:none;
  }
</style>
</head>
<body>

<div class="radio">
  <div class="station-bar">
    <div class="station-name">ATTITUDE FM</div>
    <div class="freq">98.7 MHz <span class="dot" id="liveDot"></span> <span id="liveLabel">OFF AIR</span></div>
  </div>

  <div class="lcd">
    <div class="label">NOW QUEUED</div>
    <div class="track" id="trackText">TERA LOSS — AKELA SHER · 0:38</div>
  </div>

  <div class="stage">
    <div class="knob" id="knob">
      <div class="core" id="core">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconStop" viewBox="0 0 24 24" style="display:none;"><rect x="6" y="6" width="12" height="12"/></svg>
      </div>
    </div>
    <div class="cta" id="ctaText">TAP TO BROADCAST</div>
    <div class="eq" id="eq">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="lines" id="lines"></div>

  <div class="no-voice-note" id="noVoiceNote">Tere browser mein voice support nahi mila — text padh le upar se, attitude wahi hai.</div>

  <div class="footer-tag">ONE TRACK · NO REQUESTS · NO REPEATS (unless you tap again)</div>
</div>

<script>
  const shayariLines = [
    "Tune block kiya tha humein masti-masti mein,",
    "Hum nikal gaye aage, teri har basti se.",
    "Jo tu samajhti thi, khatam ho gayi kahani,",
    "Wahi se shuru hui hamari asli jawani.",
    "Na fikar hai teri, na parwah teri yaad ki,",
    "Attitude apna hai, baaki sab baatein hai baad ki.",
    "Khatri the, khatri hain, khatri rahenge hum sada,",
    "Tu dhoondegi kal humein, hum na honge tab khada."
  ];

  const linesEl = document.getElementById('lines');
  const knob = document.getElementById('knob');
  const core = document.getElementById('core');
  const iconPlay = document.getElementById('iconPlay');
  const iconStop = document.getElementById('iconStop');
  const ctaText = document.getElementById('ctaText');
  const eq = document.getElementById('eq');
  const liveDot = document.getElementById('liveDot');
  const liveLabel = document.getElementById('liveLabel');
  const trackText = document.getElementById('trackText');
  const noVoiceNote = document.getElementById('noVoiceNote');

  shayariLines.forEach((text, i) => {
    const div = document.createElement('div');
    div.className = 'line';
    div.id = 'line-' + i;
    div.textContent = text;
    linesEl.appendChild(div);
  });

  let playing = false;
  let chosenVoice = null;

  function pickVoice(){
    if(!('speechSynthesis' in window)) return null;
    const voices = speechSynthesis.getVoices();
    let v = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('hi'));
    if(!v) v = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en-in'));
    if(!v) v = voices[0];
    return v || null;
  }

  if('speechSynthesis' in window){
    speechSynthesis.onvoiceschanged = () => { chosenVoice = pickVoice(); };
    chosenVoice = pickVoice();
  } else {
    noVoiceNote.style.display = 'block';
  }

  function setActive(idx){
    document.querySelectorAll('.line').forEach((el, i) => {
      el.classList.remove('active');
      if(i < idx) el.classList.add('done');
    });
    if(idx < shayariLines.length){
      document.getElementById('line-' + idx).classList.add('active');
    }
  }

  function resetUI(){
    playing = false;
    knob.classList.remove('playing');
    iconPlay.style.display = '';
    iconStop.style.display = 'none';
    ctaText.textContent = 'BROADCAST AGAIN';
    eq.classList.remove('live');
    liveDot.classList.remove('live');
    liveLabel.textContent = 'OFF AIR';
    trackText.textContent = 'TERA LOSS — AKELA SHER · ENDED';
    document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
  }

  function speakLine(idx){
    if(idx >= shayariLines.length){
      resetUI();
      return;
    }
    setActive(idx);
    if(!('speechSynthesis' in window)){
      setTimeout(() => speakLine(idx + 1), 1400);
      return;
    }
    const utter = new SpeechSynthesisUtterance(shayariLines[idx]);
    if(chosenVoice) utter.voice = chosenVoice;
    utter.rate = 0.92;
    utter.pitch = 0.85;
    utter.volume = 1;
    utter.onend = () => speakLine(idx + 1);
    utter.onerror = () => speakLine(idx + 1);
    speechSynthesis.speak(utter);
  }

  function startBroadcast(){
    playing = true;
    knob.classList.add('playing');
    iconPlay.style.display = 'none';
    iconStop.style.display = '';
    ctaText.textContent = 'ON AIR — TAP TO STOP';
    eq.classList.add('live');
    liveDot.classList.add('live');
    liveLabel.textContent = 'ON AIR';
    trackText.textContent = 'NOW PLAYING: TERA LOSS — AKELA SHER';
    speakLine(0);
  }

  function stopBroadcast(){
    if('speechSynthesis' in window) speechSynthesis.cancel();
    resetUI();
  }

  knob.addEventListener('click', () => {
    if(playing){
      stopBroadcast();
    } else {
      startBroadcast();
    }
  });
</script>

</body>
</html>
